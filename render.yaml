# Blueprint Render — sesuaikan nama service Anda.
services:
  - type: web
    name: sistem-nilai-ijazah
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "22.14.0"
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: SUPERADMIN_EMAILS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: MAIL_TRANSPORT
        sync: false
      - key: SMTP_SEND_TIMEOUT_MS
        sync: false
      - key: CRON_SECRET
        sync: false
